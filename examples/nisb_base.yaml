n_scales: 3 # number of scales per dataset
output_axes: "lcxyz" # input will be automatically re-ordered to match this axes order (default: "xyz")
patch_size: [128, 128, 128]
bbox_mode: "relative" # "absolute" (world coords) or "relative" (relative to finest-level crop origin)
isotropic: true # resample crops to isotropic voxel resolution via trilinear interpolation
samples_per_epoch: 10000
cache_bytes: 536870912 # 512 MiB cache for each dataset (default: `0` for no caching)
